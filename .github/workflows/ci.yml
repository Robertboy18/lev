name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.85.0", stable]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - name: Verify Unix installer syntax
        run: sh -n scripts/install.sh
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked
      - name: Build warning-free documentation
        if: matrix.rust == 'stable'
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features
      - name: Verify crates.io package
        if: matrix.rust == 'stable'
        run: cargo package --locked

  portability:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [void] [scriptblock]::Create((Get-Content -Raw scripts/install.ps1))
      - name: Test without platform-specific warnings
        env:
          RUSTFLAGS: -D warnings
        run: cargo test --locked

  lean:
    name: Lean compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh |
            sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - run: cargo build --locked
      - name: Test Lean compatibility
        env:
          LEV_MATRIX_VERSIONS: ${{ vars.LEV_CI_TOOLCHAINS || 'stable' }}
        run: scripts/test-lean-matrix.sh
